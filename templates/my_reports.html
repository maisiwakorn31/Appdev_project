<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ปัญหาของคุณ</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>
<body>

<!-- navbar -->
<nav class="navbar">
    <div class="nav-container">
        <div class="brand">แจ้งปัญหา</div>

        <ul class="nav-links">
            <li><a href="/">หน้าหลัก</a></li>
            <li><a href="/report">แจ้งปัญหา</a></li>
            <li><a href="/my_reports">ปัญหาของคุณ</a></li>
        </ul>

        <div class="auth-buttons">
            <a href="/logout" class="btn-logout">Logout</a>
        </div>
    </div>
</nav>


<main class="content-section">

<h3>ปัญหาที่คุณแจ้ง</h3>

<div class="issue-grid">

{% for r in reports %}

<div class="issue-card">

    <div class="card-header">

        <div class="issue-icon">
            <i class="fa-solid fa-triangle-exclamation"></i>
        </div>

        {% if r[3] == "รอดำเนินการ" %}
        <span class="status-badge yellow">{{ r[3] }}</span>

        {% elif r[3] == "กำลังดำเนินการ" %}
        <span class="status-badge blue">{{ r[3] }}</span>

        {% else %}
        <span class="status-badge green">{{ r[3] }}</span>
        {% endif %}

    </div>

    <div class="card-body">

        <h4>{{ r[0] }}</h4>

        <p>{{ r[1] }}</p>

        {% if r[2] %}
        <img class="report-image"
        src="{{ url_for('static', filename='uploads/' + r[2]) }}">
        {% endif %}

    </div>

</div>

{% endfor %}

</div>

</main>

</body>
</html>
