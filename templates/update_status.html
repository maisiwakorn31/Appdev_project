<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>อัปเดตสถานะ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* สไตล์เบื้องต้นสำหรับหน้าอัปเดตสถานะ */
        body { background-color: #2b2b2b; color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .update-box { background-color: white; padding: 30px; border-radius: 10px; width: 500px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .update-box h2 { margin-top: 0; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-container { text-align: right; margin-top: 20px; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; }
        .btn-cancel { background-color: #fff; color: #333; border: 1px solid #ccc; margin-right: 10px; }
        .btn-save { background-color: #ff9800; color: white; }
    </style>
</head>
<body>

<div class="update-box">
    <h2>อัปเดตสถานะ:</h2>
    <form action="/update_status/{{ id }}" method="POST">
        
        <div class="form-group">
            <label>หัวข้อปัญหา</label>
            <input type="text" class="form-control" value="{{ report[0] }}" readonly>
        </div>

        <div class="form-group">
            <label>สถานะ</label>
            <select name="status" class="form-control" required>
                <option value="รอดำเนินการ" {% if report[1] == 'รอดำเนินการ' %}selected{% endif %}>รอดำเนินการ</option>
                <option value="กำลังดำเนินการ" {% if report[1] == 'กำลังดำเนินการ' %}selected{% endif %}>กำลังดำเนินการ</option>
                <option value="แก้ไขแล้ว" {% if report[1] == 'แก้ไขแล้ว' %}selected{% endif %}>แก้ไขแล้ว</option>
            </select>
        </div>

        <div class="form-group">
            <label>หมายเหตุ</label>
            <textarea name="admin_note" class="form-control" rows="4" placeholder="หมายเหตุจากเจ้าหน้าที่">{{ report[2] }}</textarea>
        </div>

        <div class="btn-container">
            <a href="/dashboard" class="btn btn-cancel">ยกเลิก</a>
            <button type="submit" class="btn btn-save">บันทึก</button>
        </div>
    </form>
</div>

</body>
</html>
