<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>อัพเดตสถานะ</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body.edit-page {
            font-family: 'Prompt', sans-serif;
            background-color: #2D2D2D;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .edit-wrapper {
            width: 100%;
            max-width: 700px;
            padding: 20px;
            box-sizing: border-box;
        }
        .edit-card {
            background-color: #FFFFFF;
            padding: 40px 50px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .edit-title {
            font-size: 24px;
            font-weight: 600;
            color: #000000;
            margin-top: 0;
            margin-bottom: 30px;
        }
        .form-group { margin-bottom: 25px; }
        .form-label {
            display: block;
            font-size: 16px;
            font-weight: 500;
            color: #000000;
            margin-bottom: 10px;
        }
        .form-control {
            width: 100%;
            padding: 12px 20px;
            font-family: 'Prompt', sans-serif;
            font-size: 16px;
            border: 1px solid #CCCCCC;
            border-radius: 30px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-control:focus { border-color: #F59E0B; }
        .form-control:disabled {
            background-color: #FFFFFF;
            color: #666666;
            cursor: not-allowed;
        }
        .status-select {
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            width: fit-content;
            min-width: 200px;
        }
        .textarea-note {
            resize: vertical;
            min-height: 120px;
            border-radius: 20px;
            padding: 15px 20px;
        }
        .textarea-note::placeholder { color: #60A5FA; opacity: 1; }
        .edit-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 40px;
        }
        .btn-cancel {
            font-family: 'Prompt', sans-serif;
            font-size: 16px;
            font-weight: 500;
            color: #000000;
            background-color: #FFFFFF;
            border: 1px solid #CCCCCC;
            border-radius: 10px;
            padding: 10px 30px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn-cancel:hover { background-color: #F3F4F6; }
        .btn-save {
            font-family: 'Prompt', sans-serif;
            font-size: 16px;
            font-weight: 500;
            color: #FFFFFF;
            background-color: #F59E0B;
            border: none;
            border-radius: 10px;
            padding: 10px 40px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn-save:hover { background-color: #D97706; }
    </style>
</head>
<body class="edit-page">

    <div class="edit-wrapper">
        <div class="edit-card">
            <h2 class="edit-title">อัพเดตสถานะ</h2>
            
            <form method="POST" action="{{ url_for('edit_report.edit_report', id=id) }}">
                <div class="form-group">
                    <label class="form-label">หัวข้อปัญหา</label>
                    <input type="text" value="{{ report[0] }}" disabled class="form-control">
                </div>
                <div class="form-group">
                    <label class="form-label">สถานะ</label>
                    <select name="status" class="form-control status-select" required>
                        <option value="แก้ไขแล้ว" {% if report[1] == 'แก้ไขแล้ว' %}selected{% endif %}>🟢 แก้ไขแล้ว</option>
                        <option value="กำลังดำเนินการ" {% if report[1] == 'กำลังดำเนินการ' %}selected{% endif %}>🔵 กำลังดำเนินการ</option>
                        <option value="รอดำเนินการ" {% if report[1] == 'รอดำเนินการ' %}selected{% endif %}>🟠 รอดำเนินการ</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">หมายเหตุ</label>
                    <textarea class="form-control textarea-note" placeholder="หมายเหตุจากเจ้าหน้าที่"></textarea>
                </div>
                <div class="edit-actions">
                    <button type="button" onclick="window.location.href='{{ url_for('dashboard.dashboard') }}'" class="btn-cancel">ยกเลิก</button>
                    <button type="submit" class="btn-save">บันทึก</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
