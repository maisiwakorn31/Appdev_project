<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/css/style.css">
    <title>Document</title>
</head>

<script>
window.onload = function() {
    const modal = document.getElementById("loginModal");
    modal.style.display = "flex";
}
</script>

<body>


<div id="loginModal" class="modal-overlay">
    <div class="modal-content">
        <a href="/" class="close-btn">&times;</a>
        
        <h2 class="modal-title">เข้าสู่ระบบ</h2>
        <form action="#">
            <div class="form-group">
                <label>ชื่อผู้ใช้งาน (Username)</label>
                <input type="text" placeholder="กรอกชื่อผู้ใช้งาน" required>
            </div>
            <div class="form-group">
                <label>รหัสผ่าน (Password)</label>
                <input type="password" placeholder="กรอกรหัสผ่าน" required>
            </div>
            <div class="form-group">
                <label>เบอร์โทรศัพท์</label>
                <input type="tel" placeholder="08X-XXX-XXXX" pattern="[0-9]{10}" required>
            </div>
            <button type="submit" class="btn-submit">ยืนยันข้อมูล</button>
        </form>
    </div>
</div>
    
</body>
</html>
