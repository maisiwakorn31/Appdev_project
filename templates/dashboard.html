<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แผงควบคุม</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">

    <h2 class="page-title">แผงควบคุมของคุณ</h2>

    <div class="dashboard-card">
        <table class="report-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>หัวข้อ</th>
                    <th>สถานะ</th>
                    <th>สถานที่</th>
                    <th>วันที่แจ้ง</th>
                    <th>จัดการ</th>
                </tr>
            </thead>
            <tbody>
                {% for r in reports %}
                <tr>
                    <td>{{ r[1] }}</td>        <!-- id -->
                    <td>{{ r[2] }}</td>        <!-- title -->
                    <td>
                        <span class="status {{ r[3] }}">{{ r[3] }}</span>
                    </td>
                    <td>{{ r[6] }}</td>        <!-- location -->
                    <td>{{ r[4][:10] }}</td>   <!-- date -->
                    <td>
                        <a href="{{ url_for('edit_report.edit_report', id=r[0]) }}" class="btn-edit">✏️ แก้ไข</a>
                        <a href="{{ url_for('delete_report.delete_report', id=r[0]) }}" class="btn-delete" onclick="return confirm('ต้องการลบหรือไม่')">🗑 ลบ</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>

<script>
    
    let currentRole = "{{ session.get('role') }}";

    
    setInterval(function() {
        fetch('/api/check_role')
            .then(response => response.json())
            .then(data => {
                
                if (data.role && data.role !== currentRole) {
                    console.log("สิทธิ์เปลี่ยนแล้ว! กำลังรีเฟรชหน้าจอ...");
                    window.location.reload(); 
                }
            })
            .catch(error => console.error('Error:', error));
    }, 3000); 
</script>

</body>
</html>
