<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>แผงควบคุม</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">

<h2 class="page-title">แผงควบคุมของคุณ</h2>

<div class="dashboard-card">

<table class="report-table">

<thead>
<tr>
<th>หัวข้อ</th>
<th>สถานะ</th>
<th>วันที่แจ้ง</th>
<th>จัดการ</th>
</tr>
</thead>

<tbody>

{% for r in reports %}
<tr>

<td>{{ r[1] }}</td>

<td>
<span class="status {{ r[2] }}">
{{ r[2] }}
</span>
</td>

<td>{{ r[3][:10] }}</td>

<td>

<a href="{{ url_for('edit_report', id=r[0]) }}" class="btn-edit">
✏️ แก้ไข
</a>

<a href="{{ url_for('delete_report', id=r[0]) }}"
class="btn-delete"
onclick="return confirm('ต้องการลบหรือไม่')">
🗑 ลบ
</a>

</td>

</tr>
{% endfor %}

</tbody>

</table>

</div>

</div>

</body>
</html>
