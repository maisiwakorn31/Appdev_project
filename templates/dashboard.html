<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แผงควบคุม</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">

    <h2 class="page-title">แผงควบคุมของคุณ</h2>

    <div class="dashboard-card">
        <table class="report-table">
            <thead>
                <tr>
                    <th>หัวข้อ</th>
                    <th>สถานะ</th>
                    <th>วันที่แจ้ง</th>
                    <th>จัดการ</th>
                </tr>
            </thead>
            <tbody>
                {% for r in reports %}
                <tr>
                    <td>{{ r[1] }}</td>
                    <td>
                        <span class="status {{ r[2] }}">{{ r[2] }}</span>
                    </td>
                    <td>{{ r[3][:10] }}</td>
                    <td>
                        <a href="{{ url_for('edit_report.edit_report', id=r[0]) }}" class="btn-edit">✏️ แก้ไข</a>
                        <a href="{{ url_for('delete_report.delete_report', id=r[0]) }}" class="btn-delete" onclick="return confirm('ต้องการลบหรือไม่')">🗑 ลบ</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>

<script>
    // 1. ให้ระบบจำสิทธิ์ปัจจุบันตอนที่โหลดหน้าเว็บขึ้นมาครั้งแรก
    let currentRole = "{{ session.get('role') }}";

    // 2. ตั้งเวลาให้แอบเช็คทุกๆ 3 วินาที (3000 มิลลิวินาที)
    setInterval(function() {
        fetch('/api/check_role')
            .then(response => response.json())
            .then(data => {
                // 3. ถ้าเช็คแล้วพบว่าสิทธิ์ในฐานข้อมูล "ไม่ตรง" กับที่จำไว้ตอนแรก!
                if (data.role && data.role !== currentRole) {
                    console.log("สิทธิ์เปลี่ยนแล้ว! กำลังรีเฟรชหน้าจอ...");
                    
                    // สั่งให้เบราว์เซอร์รีเฟรชตัวเองอัตโนมัติทันที
                    window.location.reload(); 
                }
            })
            .catch(error => console.error('Error:', error));
    }, 3000); 
</script>

</body>
</html>
