<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายงานปัญหา</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/report-style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <a href="#" class="back-link">
            <i class="fa-solid fa-arrow-left"></i> ย้อนกลับ
        </a>

        <div class="form-card">
            <form action="/report" method="POST" enctype="multipart/form-data">
                
                <div class="form-group">
                    <label>หัวข้อปัญหา</label>
                    <input type="text" name="title" placeholder="ระบุหัวข้อปัญหา">
                </div>

                <div class="form-group">
                    <label>รายละเอียด</label>
                    <textarea name="detail" rows="3" placeholder="อธิบายรายละเอียดเพิ่มเติม"></textarea>
                </div>

                <div class="form-group">
                    <label>รูปภาพประกอบ</label>
                    <div class="file-upload-wrapper">
                        <input type="file" name="image" id="file-input" accept="image/*">
                        <label for="file-input" class="file-label">
                            <i class="fa-solid fa-camera"></i> เลือกรูปภาพหรือถ่ายภาพ
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label>สถานที่</label>
                    <input type="text" name="location" placeholder="ระบุตำแหน่งที่ตั้งหรือจุดสังเกต">
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>ชื่อผู้แจ้ง</label>
                        <input type="text" name="reporter_name" value="{{ user[0] }}" readonly>
                    </div>
                    <div class="form-group">
                        <label>เบอร์โทรศัพท์</label>
                        <input type="tel" name="phone" value="{{ user[1] }}" readonly>
                    </div>
                </div>

                <button type="submit" class="btn-submit">ส่งรายงานปัญหา</button>
            </form>
        </div>
    </div>

</body>
</html>
